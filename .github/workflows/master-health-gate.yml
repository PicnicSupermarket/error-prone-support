name: Require green master
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - name: Install Harden-Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          disable-sudo-and-containers: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
      - name: Check master health
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prLabels = context.payload.pull_request?.labels ?? [];
            if (prLabels.some((l) => l.name === 'merge-when-master-red')) {
              core.info('Bypass label "merge-when-master-red" found; skipping master health check.');
              return;
            }

            const { data: masterRef } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/master',
            });
            const masterSha = masterRef.object.sha;
            core.info(`Checking master at ${masterSha}`);

            const checkRuns = await github.paginate(github.rest.checks.listForRef, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: masterSha,
              per_page: 100,
            });

            // When a workflow is re-run, GitHub creates a new check suite per
            // attempt. This means the same check name can appear multiple times
            // for a given SHA, once per attempt. To correctly handle re-runs,
            // we deduplicate by name and keep only the most recently created
            // check run (highest ID, since IDs are monotonically increasing).
            const latestByName = new Map();
            for (const cr of checkRuns) {
              const existing = latestByName.get(cr.name);
              if (!existing || cr.id > existing.id) {
                latestByName.set(cr.name, cr);
              }
            }
            core.info(`Found ${checkRuns.length} check run(s); ${latestByName.size} unique name(s).`);

            const failureConclusions = new Set(['failure', 'timed_out', 'action_required', 'cancelled']);
            // Note: the `startsWith` check below relies on this workflow's `name:` field.
            const failures = [...latestByName.values()].filter(
              (cr) =>
                cr.status === 'completed' &&
                failureConclusions.has(cr.conclusion) &&
                !cr.name.startsWith('Require green master'),
            );

            if (failures.length > 0) {
              const details = failures.map((cr) => `  - ${cr.name}: ${cr.conclusion} (${cr.html_url})`).join('\n');
              core.setFailed(`Master branch has ${failures.length} failing check(s):\n${details}`);
            } else {
              core.info('All completed checks on master are green.');
            }
