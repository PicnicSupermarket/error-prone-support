name: Validate review checklist
on:
  pull_request:
    paths:
      - '.github/instructions/*.instructions.md'
      - 'generate-review-checklist.sh'
  push:
    branches: [ master ]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Install Harden-Runner
        if: ${{ !env.ACT }}
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          # XXX: We can't use `disable-sudo-and-containers` here, as the Pandoc
          # setup action below installs a `.deb` package using `sudo`.
          # XXX: Use `disable-sudo-and-containers: true` and drop the
          # "Install pandoc" step below if we reimplement the
          # `generate-review-checklist.sh` logic in Java.
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            release-assets.githubusercontent.com:443
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pandoc
        uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e # v1.1.1
      - name: Regenerate review checklist
        run: ./generate-review-checklist.sh
      - name: Check for drift
        run: |
          if ! git diff --exit-code .github/instructions/review.instructions.md; then
            echo 'ERROR: `review.instructions.md` is out of sync with the source instruction files.'
            echo 'Run `./generate-review-checklist.sh` and commit the result.'
            exit 1
          fi
