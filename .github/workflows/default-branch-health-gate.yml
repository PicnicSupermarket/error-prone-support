name: Require that all checks on the default branch pass
on:
  pull_request:
permissions:
  contents: read
jobs:
  check:
    if: ${{ github.base_ref == github.event.repository.default_branch }}
    runs-on: ubuntu-24.04
    steps:
      - name: Install Harden-Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          disable-sudo-and-containers: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
      - name: Check default branch health
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prLabels = context.payload.pull_request?.labels ?? [];
            if (prLabels.some((l) => l.name === 'allow-merge-when-master-red')) {
              core.info('Bypass label "allow-merge-when-master-red" found; skipping default branch health check.');
              return;
            }

            const defaultBranch = context.payload.repository.default_branch;
            const { data: branchRef } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${defaultBranch}`,
            });
            const defaultBranchSha = branchRef.object.sha;
            core.info(`Checking ${defaultBranch} at ${defaultBranchSha}`);

            // Only consider workflow runs triggered by a push event, so as to
            // ignore other events such as `issue_comment` that also trigger
            // workflow runs against the default branch.
            const [workflowRuns, allCheckRuns] = await Promise.all([
              github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: defaultBranchSha,
                event: 'push',
                per_page: 100,
              }),
              github.paginate(github.rest.checks.listForRef, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: defaultBranchSha,
                per_page: 100,
              }),
            ]);
            const pushSuiteIds = new Set(workflowRuns.map((run) => run.check_suite_id));
            const checkRuns = allCheckRuns.filter((cr) => pushSuiteIds.has(cr.check_suite?.id));

            // When a workflow is re-run, GitHub creates a new check suite per
            // attempt. This means that the same check name can appear multiple
            // times for a given SHA, once per attempt. To correctly handle
            // re-runs, we deduplicate by name and keep only the most recently
            // created check run (the one with the highest ID, as IDs are
            // monotonically increasing).
            const latestByName = new Map();
            for (const cr of checkRuns) {
              const existing = latestByName.get(cr.name);
              if (!existing || cr.id > existing.id) {
                latestByName.set(cr.name, cr);
              }
            }
            core.info(`Found ${checkRuns.length} push event check runs; ${latestByName.size} unique names.`);

            const successConclusions = new Set(['neutral', 'skipped', 'stale', 'success']);
            const failures = [...latestByName.values()].filter(
              (cr) => cr.status === 'completed' && !successConclusions.has(cr.conclusion),
            );

            if (failures.length > 0) {
              const details = failures.map((cr) => `  - ${cr.name}: ${cr.conclusion} (${cr.html_url})`).join('\n');
              core.setFailed(`Default branch has ${failures.length} failing check(s):\n${details}`);
            } else {
              core.info('All completed checks on the default branch are green.');
            }
